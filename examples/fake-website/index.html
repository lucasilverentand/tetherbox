<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tetherbox Smoke Site</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f4ef;
        color: #1e2528;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 48px));
        padding: 40px;
        border: 1px solid #d8d2c4;
        border-radius: 8px;
        background: #fffdf8;
        box-shadow: 0 24px 60px rgb(30 37 40 / 12%);
      }

      p {
        margin: 0;
        color: #586368;
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 16px;
        color: #6f4d2e;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 2.5rem;
        line-height: 0.98;
      }

      @media (min-width: 720px) {
        h1 {
          font-size: 4.5rem;
        }
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 28px;
        padding: 10px 12px;
        border: 1px solid #c6d8d0;
        border-radius: 8px;
        background: #eef8f3;
        color: #264f3f;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Tetherbox validation fixture</p>
      <h1>Fake Website Smoke Test</h1>
      <p>
        This static page is intentionally small. It gives Tetherbox a harmless
        website-shaped change to validate, commit, push, and publish from a
        Linear agent session.
      </p>
      <div class="status" aria-label="Validation target ready">
        <span aria-hidden="true">OK</span>
        Ready for automated validation
      </div>
    </main>
  </body>
</html>
